<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Editorial Directory | Panorama Scholarly Group</title>
    <link rel="icon" href="assets/images/panorama-logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "surface": "#ffffff",
              "on-surface": "#000000",
              "surface-variant": "#f9fafb",
              "outline-variant": "#e5e7eb",
            },
            fontFamily: {
              "headline": ["Inter", "sans-serif"],
              "body": ["Inter", "sans-serif"],
            },
            borderRadius: {"DEFAULT": "0px", "sm": "0px", "md": "0px", "lg": "0px", "xl": "0px", "2xl": "0px", "3xl": "0px", "full": "0px"},
          },
        },
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000000; }
      ::selection { background-color: #000000; color: #ffffff; }
      input:focus, a:focus, a:active, button:focus {
          outline: none !important;
          box-shadow: none !important;
          text-decoration: none !important;
      }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased flex flex-col min-h-screen">

    <nav class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-sm border-b border-black">
        <div class="flex flex-col md:flex-row justify-between items-center max-w-5xl mx-auto px-8 h-auto md:h-20 py-4 md:py-0">
            <a href="index.html" class="flex items-center gap-3 mb-4 md:mb-0 outline-none">
                <img src="assets/images/panorama-logo.png" alt="Logo" class="h-10 w-auto">
                <div class="text-sm font-bold tracking-widest text-black uppercase">Panorama Scholarly Group</div>
            </a>
            <div class="flex items-center gap-6 md:gap-8 overflow-x-auto w-full md:w-auto pb-2 md:pb-0">
                <a class="text-gray-500 hover:text-black transition-colors font-inter tracking-tight font-medium text-xs uppercase outline-none" href="index.html">Home</a>
                <a class="text-black font-bold border-b-2 border-black pb-1 font-inter tracking-tight text-xs uppercase outline-none" href="directory.html">Directory</a>
                <a class="text-gray-500 hover:text-black transition-colors font-inter tracking-tight font-medium text-xs uppercase outline-none" href="about.html">About</a>
                <a class="text-gray-500 hover:text-black transition-colors font-inter tracking-tight font-medium text-xs uppercase outline-none" href="index.html#contact">Contact</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-24 md:pt-32">
        <section class="max-w-5xl mx-auto px-8 py-12">
            <div class="mb-12">
                <p class="text-gray-500 font-bold tracking-widest text-[10px] uppercase mb-4">Academic Network</p>
                <h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter leading-none mb-8 text-black">Editorial Directory</h1>
                
                <div class="bg-surface-variant border border-black p-6 relative max-w-2xl">
                    <div class="flex items-center bg-white border-b border-black pb-1">
                        <span class="material-symbols-outlined text-black mx-3 text-2xl">search</span>
                        <input type="text" id="directory-search" 
                               class="w-full bg-transparent border-none text-lg text-black placeholder-gray-400 font-light px-0 py-2 focus:ring-0 outline-none" 
                               placeholder="Filter by name, institution, or keywords...">
                    </div>
                    <div id="search-results" class="absolute w-full left-0 top-full mt-[-1px] border border-black bg-white hidden z-40 shadow-2xl max-h-80 overflow-y-auto"></div>
                </div>
            </div>

            <div class="border-t border-black pt-12">
                <div class="flex justify-between items-center mb-12">
                    <span id="result-count" class="text-[10px] font-mono text-gray-500 uppercase tracking-widest italic">Loading members...</span>
                </div>

                <div class="space-y-8" id="scholar-list">
                    </div>

                <div class="mt-16 text-center">
                    <button id="load-more-btn" style="display: none;" class="bg-white border border-black text-black px-12 py-4 text-[10px] font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-colors outline-none cursor-pointer">
                        Load More Scholars
                    </button>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-white w-full border-t border-black mt-auto">
        <div class="max-w-5xl mx-auto px-8 py-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="font-bold text-black uppercase tracking-widest text-xs">Panorama Scholarly Group</div>
            <div class="font-inter text-[10px] uppercase tracking-widest text-gray-500 text-center md:text-left">© 2026 Panorama Scholarly Group. Editorial Directory.</div>
        </div>
    </footer>

    <script>
        const scholarListContainer = document.getElementById('scholar-list');
        const loadMoreBtn = document.getElementById('load-more-btn');
        const searchInput = document.getElementById('directory-search');
        const resultCountLabel = document.getElementById('result-count');
        
        let editorialData = []; 
        let currentlyShown = 0;
        const itemsToLoad = 5; // Loading 5 at a time for the dedicated directory page

        fetch('data/scholars.json')
            .then(res => res.json())
            .then(data => {
                editorialData = data;
                resultCountLabel.innerText = `${data.length} total editorial members found`;
                renderCards(itemsToLoad);
                initSearch();
            })
            .catch(err => {
                scholarListContainer.innerHTML = '<p class="text-sm italic text-gray-500">Error connecting to directory data.</p>';
            });

        function renderCards(countToLoad) {
            const limit = Math.min(currentlyShown + countToLoad, editorialData.length);
            for (let i = currentlyShown; i < limit; i++) {
                const scholar = editorialData[i];
                const imageHTML = (scholar.imagePath && scholar.imagePath.trim() !== "") 
                    ? `<img alt="${scholar.name}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" src="${scholar.imagePath}"/>`
                    : `<div class="w-full h-full flex items-center justify-center bg-gray-100 transition-colors group-hover:bg-gray-200"><span class="material-symbols-outlined text-4xl text-gray-400">person</span></div>`;

                const cardHTML = `
                    <div class="scholar-card border border-outline-variant p-8 hover:border-black transition-colors flex flex-col md:flex-row gap-8 items-start group">
                        <a href="${scholar.profileLink}" class="w-32 h-40 bg-surface-variant flex-shrink-0 border border-outline-variant overflow-hidden block outline-none">
                            ${imageHTML}
                        </a>
                        <div class="flex-grow">
                            <a href="${scholar.profileLink}" class="block outline-none"><h4 class="text-2xl font-bold text-black mb-2">${scholar.name}</h4></a>
                            <p class="text-xs uppercase tracking-widest text-gray-500 font-bold mb-4">${scholar.affiliation}</p>
                            <p class="text-sm text-gray-600 mb-6 max-w-2xl leading-relaxed font-light">${scholar.bio}</p>
                            <a href="${scholar.profileLink}" class="text-[10px] font-bold uppercase tracking-widest border-b border-black pb-1 hover:text-gray-500 transition-colors outline-none">Full Academic Profile</a>
                        </div>
                    </div>`;
                scholarListContainer.insertAdjacentHTML('beforeend', cardHTML);
            }
            currentlyShown = limit;
            loadMoreBtn.style.display = currentlyShown < editorialData.length ? 'inline-block' : 'none';
        }

        loadMoreBtn.addEventListener('click', () => renderCards(itemsToLoad));

        function initSearch() {
            searchInput.addEventListener('input', function() {
                const query = this.value.toLowerCase().trim();
                if (query === '') {
                    scholarListContainer.innerHTML = '';
                    currentlyShown = 0;
                    renderCards(itemsToLoad);
                    resultCountLabel.innerText = `${editorialData.length} total editorial members found`;
                    return;
                }

                const filtered = editorialData.filter(ed => 
                    ed.name.toLowerCase().includes(query) || 
                    ed.affiliation.toLowerCase().includes(query) || 
                    (ed.keywords && ed.keywords.some(kw => kw.toLowerCase().includes(query)))
                );

                scholarListContainer.innerHTML = '';
                currentlyShown = 0;
                resultCountLabel.innerText = `${filtered.length} matches found for "${query}"`;
                
                filtered.forEach(scholar => {
                    // Reuse the card logic above or create a simplified view for search results
                    // Here we show full cards for filtered results
                    const imageHTML = (scholar.imagePath && scholar.imagePath.trim() !== "") 
                        ? `<img alt="${scholar.name}" class="w-full h-full object-cover" src="${scholar.imagePath}"/>`
                        : `<div class="w-full h-full flex items-center justify-center bg-gray-100"><span class="material-symbols-outlined text-4xl text-gray-400">person</span></div>`;
                    
                    const cardHTML = `<div class="scholar-card border border-black p-8 flex flex-col md:flex-row gap-8 items-start">
                        <a href="${scholar.profileLink}" class="w-32 h-40 bg-surface-variant flex-shrink-0 border border-outline-variant overflow-hidden block">
                            ${imageHTML}
                        </a>
                        <div class="flex-grow">
                            <h4 class="text-2xl font-bold text-black mb-2">${scholar.name}</h4>
                            <p class="text-xs uppercase tracking-widest text-gray-500 font-bold mb-4">${scholar.affiliation}</p>
                            <p class="text-sm text-gray-600 mb-6 font-light">${scholar.bio}</p>
                            <a href="${scholar.profileLink}" class="text-[10px] font-bold uppercase tracking-widest border-b border-black pb-1">Full Academic Profile</a>
                        </div>
                    </div>`;
                    scholarListContainer.insertAdjacentHTML('beforeend', cardHTML);
                });
                loadMoreBtn.style.display = 'none';
            });
        }
    </script>
</body>
</html>
