name: Generate and Update Sitemap

on:
  push:
    branches:
      - main  # 触发分支，请确认您的主分支名称
    paths:
      - '**/*.html' # 仅在 HTML 文件变动时触发
  workflow_dispatch: # 允许手动运行

permissions:
  contents: write

jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    name: Build Sitemap
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          # 填入您提供的正式域名
          base-url-path: https://profiles.panorama-sg.com/
          # 针对 .html 静态网站，必须保留后缀
          drop-html-extension: false
          # 排除图片资源、JSON 数据文件及配置文件，确保站点地图仅包含页面
          exclude-paths: "assets/ data/ wrangler.jsonc robots.txt"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes to sitemap.xml"
          else
            git commit -m "chore: automated sitemap update"
            git push
          fi
