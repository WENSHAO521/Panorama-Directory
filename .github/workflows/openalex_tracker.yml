name: Daily Journal Metrics Tracker

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      # 升级至 v4 以解决 Node.js 20 弃用警告
      uses: actions/checkout@v4

    - name: Set up Python
      # 升级至 v5
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Execute metrics crawler
      env:
        OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
      run: python scripts/update_metrics.py

    - name: Commit and push updated JSON
      # 【关键】在此步骤添加环境变量，强制绕过分支保护推送
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add all_journals_metrics.json
        git commit -m "chore(metrics): auto-update OpenAlex citation data [skip ci]" || exit 0
        git push origin main
